<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTRL6 — Members</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, Helvetica, sans-serif;}

body{
  background:url("images/30e8098f-3634-400a-b1d8-917ace0766ec.png") center/cover no-repeat;
  min-height:100vh;
  color:white;
  text-align:center;
}

.overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:linear-gradient(to bottom, rgba(10,0,40,0.6), rgba(0,0,0,0.95));
  z-index:-1;
}

.container{
  padding:80px 20px;
}

.title{
  font-size:48px;
  color:#ff5cff;
  letter-spacing:6px;
  filter:drop-shadow(0 0 10px #ff5cff) drop-shadow(0 0 30px #ff5cff);
}

.subtitle{
  margin-top:10px;
  font-size:14px;
  letter-spacing:3px;
  opacity:0.7;
}

.members-grid{
  margin-top:60px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:25px;
  max-width:900px;
  margin-left:auto;
  margin-right:auto;
}

.member-card{
  padding:40px 20px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:12px;
  font-size:20px;
  letter-spacing:2px;
  cursor:pointer;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.member-card::before{
  content:"";
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,92,255,0.4), transparent);
  transition:0.5s;
}

.member-card:hover::before{
  left:100%;
}

.member-card:hover{
  border-color:#ff5cff;
  box-shadow:0 0 20px #ff5cff;
  transform:scale(1.05);
}

.back-btn{
  margin-top:50px;
  display:inline-block;
  padding:12px 30px;
  border-radius:30px;
  background:linear-gradient(90deg,#ff5cff,#a855ff);
  color:white;
  text-decoration:none;
  font-size:14px;
}

footer{
  margin-top:40px;
  font-size:12px;
  opacity:0.6;
}

@media(max-width:600px){
  .title{font-size:32px;}
}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="container">

<h1 class="title">CTRL6 MEMBERS</h1>
<div class="subtitle">INITIAL REVEAL</div>

<div class="members-grid">
  <div class="member-card">SIGNAL DETECTED:</div>
  <div class="member-card">LEXI</div>
  <div class="member-card">STEVIE</div>
  <div class="member-card">INARA</div>
  <div class="member-card">TSHEBO</div>
  <div class="member-card">MBALI</div>
</div>
 
</div>

<a href="index2.html" class="back-btn">BACK TO HUB</a>

<footer>
CTRL6 Official © 2026
</footer>

</div>

<script>
// optional subtle sparkle effect
setInterval(()=>{
let star=document.createElement("div");
star.style.position="absolute";
star.style.width="2px";
star.style.height="2px";
star.style.background="white";
star.style.top=Math.random()*window.innerHeight+"px";
star.style.left=Math.random()*window.innerWidth+"px";
star.style.opacity=Math.random();
star.style.borderRadius="50%";
document.body.appendChild(star);
setTimeout(()=>{ star.remove(); },2000);
},140);
</script>

</body>
</html>
